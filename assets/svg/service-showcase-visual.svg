<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
<rect width="1600" height="900" fill="#FFFDF9"/>
<text x="116" y="150" font-family="Arial" font-size="22" font-weight="700" letter-spacing="4" fill="#C0392B">WHAT WE DO</text>
<text x="116" y="250" font-family="Arial" font-size="72" font-weight="800" fill="#151515">三项服务，解决一个问题。</text>
<text x="116" y="316" font-family="Arial" font-size="26" fill="#777777">让品牌达人合作变得更清楚、更可执行。</text>
<rect x="116" y="408" width="1320" height="1" fill="#E4DED6"/>
<rect x="116" y="572" width="1320" height="1" fill="#E4DED6"/>
<rect x="116" y="736" width="1320" height="1" fill="#E4DED6"/>
<text x="116" y="500" font-family="Arial" font-size="92" font-weight="800" fill="#C0392B">01</text>
<text x="328" y="486" font-family="Arial" font-size="40" font-weight="800" fill="#151515">达人营销投放</text>
<text x="328" y="536" font-family="Arial" font-size="22" fill="#666666">为品牌匹配达人、共创内容、安排发布与复盘动作。</text>
<text x="116" y="664" font-family="Arial" font-size="92" font-weight="800" fill="#C0392B">02</text>
<text x="328" y="650" font-family="Arial" font-size="40" font-weight="800" fill="#151515">达人分销与选品</text>
<text x="328" y="700" font-family="Arial" font-size="22" fill="#666666">围绕转化需求，对接更适合带货与沟通的达人合作。</text>
<text x="116" y="828" font-family="Arial" font-size="92" font-weight="800" fill="#C0392B">03</text>
<text x="328" y="814" font-family="Arial" font-size="40" font-weight="800" fill="#151515">短剧宣发协同</text>
<text x="328" y="864" font-family="Arial" font-size="22" fill="#666666">围绕上线节点、素材拆条与平台扩散做内容宣发支持。</text>
</svg>