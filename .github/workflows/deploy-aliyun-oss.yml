# 部署到「阿里云 OSS + CDN」的草稿(国内这条腿)
# 现在默认【手动触发】,不会自动跑、也不会因缺密钥而报错。
# 等你在仓库 Settings → Secrets 配好下面 4 个密钥后,
# 把 on: 里的 push 那段取消注释,即可改成「push 到 main 自动部署」。
#
# 需要的 Secrets(GitHub 仓库 Settings → Secrets and variables → Actions):
#   OSS_ENDPOINT          例:oss-cn-beijing.aliyuncs.com
#   OSS_ACCESS_KEY_ID     阿里云 AccessKey ID(建议用 RAM 子账号、只给该 Bucket 权限)
#   OSS_ACCESS_KEY_SECRET 阿里云 AccessKey Secret
#   OSS_BUCKET            你的 Bucket 名,例:bizuogehao-site

name: Deploy to Aliyun OSS (草稿·手动触发)

on:
  workflow_dispatch: {}
  # 密钥配好后取消下面注释改为自动部署:
  # push:
  #   branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 整理待上传文件(排除 .git/.github 等)
        run: |
          mkdir -p _dist
          rsync -a --exclude='.git' --exclude='.github' --exclude='_dist' ./ _dist/
          echo "将上传以下文件:" && ls _dist

      - name: 安装 ossutil
        run: |
          curl -fsSL -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil
          ./ossutil config -e "${{ secrets.OSS_ENDPOINT }}" \
                           -i "${{ secrets.OSS_ACCESS_KEY_ID }}" \
                           -k "${{ secrets.OSS_ACCESS_KEY_SECRET }}"

      - name: 同步到 OSS(--delete 保持与仓库一致)
        run: |
          ./ossutil sync _dist/ oss://${{ secrets.OSS_BUCKET }}/ --delete -f
          echo "✅ 已同步到 oss://${{ secrets.OSS_BUCKET }}/"

      # 可选:如果用了阿里云 CDN,部署后刷新 CDN 缓存(需额外装 aliyun CLI 并授权)
      # - name: 刷新 CDN 缓存(可选)
      #   run: echo "在此调用 aliyun cdn RefreshObjectCaches 刷新 https://bizuogehao.com/"
